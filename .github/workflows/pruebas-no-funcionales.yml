name: Pruebas No Funcionales (Rendimiento y Seguridad)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  no-funcionales:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: opencart
          MYSQL_USER: opencart
          MYSQL_PASSWORD: opencart
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mysqli, gd, curl, mbstring, zip, openssl
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Wait for MySQL
        run: |
          until mysql -h 127.0.0.1 -uopencart -popencart -e "SELECT 1" > /dev/null 2>&1; do
            echo "Esperando MySQL..."
            sleep 3
          done

      - name: Create storage directories
        run: |
          mkdir -p upload/system/storage/cache
          mkdir -p upload/system/storage/logs
          mkdir -p upload/system/storage/session
          mkdir -p upload/system/storage/upload
          mkdir -p upload/system/storage/download
          mkdir -p upload/system/storage/modification

      - name: Prepare config files
        run: |
          cp upload/config-dist.php upload/config.php
          cp upload/admin/config-dist.php upload/admin/config.php
          chmod 666 upload/config.php
          chmod 666 upload/admin/config.php

      - name: Start PHP server
        run: |
          php -S 127.0.0.1:8000 -t upload > php-server.log 2>&1 &
          sleep 5

      - name: Install OpenCart
        run: |
          php upload/install/cli_install.php install \
            --username admin \
            --password admin123 \
            --email admin@example.com \
            --http_server http://127.0.0.1:8000/ \
            --language en-gb \
            --db_driver mysqli \
            --db_hostname 127.0.0.1 \
            --db_username opencart \
            --db_password opencart \
            --db_database opencart \
            --db_port 3306 \
            --db_prefix oc_

      - name: Smoke test frontend
        run: curl -I http://127.0.0.1:8000

      - name: Install k6
        run: |
          curl -s https://dl.k6.io/key.gpg | gpg --dearmor | sudo tee /usr/share/keyrings/k6-archive-keyring.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run k6 load test (Rendimiento)
        run: |
          k6 run tests/no-funcionales/k6/seis-modulos-carga.js \
            --summary-export=k6-resultado.json \
            -e BASE_URL=http://127.0.0.1:8000 \
            -e ADMIN_URL=http://127.0.0.1:8000/admin \
            -e PRODUCT_ID=28 \
            -e SEARCH_TERM=Camera \
            -e CATEGORY_ID=33 \
            -e ADMIN_USERNAME=admin \
            -e ADMIN_PASSWORD=admin123 \
          | tee k6-output.txt
        continue-on-error: true

      - name: Run security checklist (Seguridad)
        run: |
          node tests/no-funcionales/seguridad/scripts/verificacion-seguridad.js \
            2>&1 | tee seguridad-resultado.txt
        env:
          BASE_URL: http://127.0.0.1:8000
          ADMIN_URL: http://127.0.0.1:8000/admin
        continue-on-error: true

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultado-rendimiento-k6
          path: |
            k6-resultado.json
            k6-output.txt
          retention-days: 30

      - name: Upload security results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultado-seguridad
          path: seguridad-resultado.txt
          retention-days: 30

      - name: Show PHP server logs if failed
        if: failure()
        run: cat php-server.log
